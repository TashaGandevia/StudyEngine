<!doctype html>
<!--
  Single HTML entry point for the app.
  Vite injects the bundled scripts here; React mounts into <div id="root">.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Engine</title>
    <!-- Inter is the project's sans font (see tailwind.config.js fontFamily).
         Preconnect speeds up the fetch; if it fails to load, the system-font
         fallback in the Tailwind stack is used, so this is non-blocking. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React renders the entire app into this node (see src/main.jsx) -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
